<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>HTML Lists</title>
    <link rel="stylesheet" type="text/css" href="CSS_Lists.css">
  </head>
  <body>

    <h2>My Favourite Foods (Unordered List)</h2>
    <ul>
      <li>Pizza</li>
      <li>Sushi</li>
      <li>Tacos</li>
      <li>Burgers</li>
    </ul>

    <h2>My Morning Routine (Ordered List)</h2>
    <ol>
      <li>Wake up</li>
      <li>Shower</li>
      <li>Eat breakfast</li>
      <li>Go to school</li>
    </ol>

  </body>
</html>
