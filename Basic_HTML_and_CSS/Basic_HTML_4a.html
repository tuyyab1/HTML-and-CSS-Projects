<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Style Element</title>
  </head>
  <body>
    <style>
      .My_Style {
        background-color: red;
        color: blue;
        text-decoration: underline;
        font-weight: bold;
        font-size: small;
      }
    </style>

    <p class="My_Style">This text is styled using My_Style class!</p>

  </body>
</html>
