<!DOCTYPE html>
<html lang="en">

    <title>HTML Table</title>
    <link rel="stylesheet" type="text/css" href="CSS_Table.css">
  </head>
  <body>

    <table>
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>City</th>
      </tr>

        <td>Alice</td>
        <td>25</td>
        <td>Toronto</td>
      </tr>
      <tr>
        <td>Bob</td>

        <td>Vancouver</td>
      </tr>
      <tr>
        <td>Charlie</td>
        <td>22</td>
        <td>Montreal</td>
      </tr>
    </table>

  </body>
</html>
